{% extends 'base.html' %}

{% block content %}
<div class="auth-card glass">
    <h1>Create Account</h1>
    <form method="POST" action="">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="JohnDoe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
    <p class="text-center mt-4">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
</div>
{% endblock %}
